<!DOCTYPE html>
<html lang="ja">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; base-uri 'self';">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ふらのジャム 果物型ボトル — クリアガラス プレビュー</title>
<style>
  :root{--ink:#2b2f33;--muted:#6b7178;}
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(180deg,#fbfcfd,#eef1f4);color:var(--ink);
    font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 40px;}
  h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  p.sub{color:var(--muted);font-size:14px;margin:0 0 16px;}
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 10px;}
  button{font:inherit;font-size:13px;padding:7px 12px;border:1px solid #cdd3da;background:#fff;border-radius:8px;cursor:pointer;}
  button:hover{background:#f3f5f7;}
  button.act{background:#2b2f33;color:#fff;border-color:#2b2f33;}
  .hint{font-size:13px;color:var(--muted);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:12px 0 14px;}
  .card{background:#fff;border:1px solid #e6e9ed;border-radius:10px;padding:10px 12px;}
  .card .l{font-size:12px;color:var(--muted);}
  .card .v{font-size:20px;font-weight:600;}
  #stage{width:100%;height:500px;border-radius:14px;border:1px solid #e2e6ea;
    background:radial-gradient(120% 90% at 50% 20%,#ffffff,#e6eaef);overflow:hidden;}
</style>
</head>
<body>
<div class="wrap">
  <h1>ふらのジャム 果物型ボトル — クリアガラス</h1>
  <p class="sub">各 内容積140ml ／ 肉厚 約5mm ／ 底厚 8mm。果物を切り替えて確認できます（茎・葉・ヘタは装飾でボトル本体には含みません）。</p>
  <div class="bar" id="fruitBar"></div>
  <div class="bar">
    <button id="btnRot">⏸ 自動回転</button>
    <button id="btnJam">● ジャムあり</button>
    <span class="hint">ドラッグで回転 ・ ホイールで拡大</span>
  </div>
  <div class="cards" id="cards"></div>
  <div id="stage"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const FRUITS={
    apple:{jp:"りんご",jam:0x9a2a17,att:0x3e0d04,top:{type:'stemleaf',stem:0x6b4a2b,leaf:0x4f9030},ctrl:[[0,0],[14.97,1.73],[26.49,5.76],[36.28,13.82],[40.31,27.64],[36.86,41.46],[27.64,50.68],[20.73,55.29],[18.43,57.59]]},
    pear:{jp:"洋なし",jam:0xE0A028,att:0x6e4810,top:{type:'stemleaf',stem:0x6b4a2b,leaf:0x5a9a35,longstem:true},ctrl:[[0,0],[12.35,0],[21.33,3.37],[30.32,10.11],[35.93,16.84],[37.05,24.7],[34.81,34.81],[29.19,47.16],[22.46,60.63],[17.97,74.11],[16.28,85.34],[15.72,92.07]]},
    haskap:{jp:"ハスカップ",jam:0x7d1f50,att:0x2a0820,top:{type:'nub',color:0x3a1226},ctrl:[[0,0],[10.19,0],[19.24,4.53],[28.29,12.45],[32.82,22.64],[33.95,36.22],[32.82,49.8],[28.29,61.12],[22.64,71.3],[19.24,78.09],[18.11,81.49]]},
    strawberry:{jp:"いちご",jam:0xC8243C,att:0x540812,top:{type:'calyx',color:0x4e9c34,n:6,big:true,stemc:0x4e9c34},ctrl:[[0,0],[10.04,0],[13.39,2.23],[18.97,8.93],[25.67,17.86],[32.37,27.9],[36.83,37.95],[37.95,49.11],[34.6,58.03],[29.02,64.73],[26.78,68.08]]},
    melon:{jp:"メロン",jam:0xEF9D33,att:0x7a4410,top:{type:'stem',color:0x4f7d2a},ctrl:[[0,0],[9.72,0],[19.44,4.32],[29.17,11.88],[34.57,21.6],[36.19,33.49],[34.57,46.45],[29.17,57.25],[21.6,65.89],[16.2,71.29],[15.12,73.46]]},
    blueberry:{jp:"ブルーベリー",jam:0x3f2f7a,att:0x120a2e,top:{type:'star',color:0x6a5a3a},ctrl:[[0,0],[13.41,0],[25.7,3.35],[35.76,11.18],[41.35,21.23],[41.35,31.29],[35.76,41.35],[26.82,48.06],[19.0,51.41],[15.65,52.53]]},
    chestnut:{jp:"栗",jam:0xA06A2C,att:0x3e2608,top:{type:'tip',color:0x5a3a1c},ctrl:[[0,0],[21.76,0],[31.44,4.84],[37.48,13.3],[38.69,24.18],[35.06,37.48],[29.02,49.57],[20.55,59.25],[14.51,66.5],[12.7,70.13]]},
    tomato:{jp:"トマト",jam:0xD23A1C,att:0x500e06,top:{type:'calyx',color:0x4a8f2c,n:5,stemc:0x4a8f2c},ctrl:[[0,0],[17.09,0],[29.91,3.21],[38.46,9.62],[42.73,18.16],[43.27,26.71],[39.53,35.26],[32.05,41.67],[23.5,45.94],[18.16,47.01]]}
  };
  const ORDER=["apple","pear","haskap","strawberry","melon","blueberry","chestnut","tomato"];
  const DIMS={apple:["57.6","80.6","27"],pear:["92.1","74.1","21"],haskap:["81.5","67.9","26"],strawberry:["68.1","75.9","44"],melon:["73.5","72.4","20"],blueberry:["52.5","82.7","21"],chestnut:["70.1","77.4","15"],tomato:["45.9","86.5","22"]};
  const WALL=5,BASE=8;

  const stage=document.getElementById('stage');const H=500;
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(stage.clientWidth,H);
  renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.15;renderer.physicallyCorrectLights=true;
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  stage.appendChild(renderer.domElement);
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(34,stage.clientWidth/H,0.1,4000);

  function envTexture(){
    const c=document.createElement('canvas');c.width=1024;c.height=512;const x=c.getContext('2d');
    let g=x.createLinearGradient(0,0,0,512);g.addColorStop(0,'#ffffff');g.addColorStop(0.42,'#eef1f4');g.addColorStop(1,'#c4ccd5');
    x.fillStyle=g;x.fillRect(0,0,1024,512);
    let rg=x.createRadialGradient(340,140,20,340,140,280);rg.addColorStop(0,'rgba(255,255,255,1)');rg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=rg;x.fillRect(0,0,1024,512);
    rg=x.createRadialGradient(770,110,10,770,110,170);rg.addColorStop(0,'rgba(255,250,240,0.9)');rg.addColorStop(1,'rgba(255,250,240,0)');
    x.fillStyle=rg;x.fillRect(0,0,1024,512);
    const t=new THREE.CanvasTexture(c);t.mapping=THREE.EquirectangularReflectionMapping;t.encoding=THREE.sRGBEncoding;return t;
  }
  const pmrem=new THREE.PMREMGenerator(renderer);pmrem.compileEquirectangularShader();
  scene.environment=pmrem.fromEquirectangular(envTexture()).texture;

  function catmull(pts,n){const P=[pts[0],...pts,pts[pts.length-1]],out=[];
    for(let i=0;i<P.length-3;i++){const p0=P[i],p1=P[i+1],p2=P[i+2],p3=P[i+3];
      for(let j=0;j<n;j++){const t=j/n,t2=t*t,t3=t2*t;
        const r=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
        const z=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
        out.push([Math.max(0,r),z]);}}
    out.push(pts[pts.length-1]);return out;}

  const glassMat=new THREE.MeshPhysicalMaterial({color:0xffffff,metalness:0,roughness:0.04,transmission:1.0,
    thickness:14,ior:1.5,clearcoat:1.0,clearcoatRoughness:0.05,envMapIntensity:1.35,
    attenuationColor:new THREE.Color(0xeef9ff),attenuationDistance:260,transparent:true,side:THREE.DoubleSide});

  function leafMat(c){return new THREE.MeshStandardMaterial({color:c,roughness:0.55,metalness:0});}
  function makeTopper(spec,topY,topR){
    const g=new THREE.Group();if(!spec)return g;
    if(spec.type==='stemleaf'){
      const stem=new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.7,spec.longstem?17:12,10),leafMat(spec.stem));
      stem.position.set(2,topY+(spec.longstem?7.5:5),0);stem.rotation.z=0.28;stem.castShadow=true;g.add(stem);
      const leaf=new THREE.Mesh(new THREE.SphereGeometry(5.2,18,12),leafMat(spec.leaf));
      leaf.scale.set(1.6,0.22,0.85);leaf.position.set(10,topY+(spec.longstem?10:6.5),2);leaf.rotation.z=0.5;leaf.rotation.y=0.4;leaf.castShadow=true;g.add(leaf);
    } else if(spec.type==='calyx'){
      const n=spec.n||5,len=spec.big?17:11,rad=spec.big?4.2:2.8;
      for(let i=0;i<n;i++){const a=i/n*Math.PI*2;
        const s=new THREE.Mesh(new THREE.ConeGeometry(rad,len,6),leafMat(spec.color));
        s.position.set(Math.cos(a)*topR*0.5,topY+2,Math.sin(a)*topR*0.5);
        s.rotation.z=-Math.cos(a)*0.95;s.rotation.x=Math.sin(a)*0.95;s.castShadow=true;g.add(s);}
      const c=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.9,7,8),leafMat(spec.stemc||0x6b4a2b));
      c.position.set(0,topY+4.5,0);g.add(c);
    } else if(spec.type==='star'){
      for(let i=0;i<5;i++){const a=i/5*Math.PI*2;
        const s=new THREE.Mesh(new THREE.ConeGeometry(2.6,7,5),leafMat(spec.color));
        s.position.set(Math.cos(a)*topR*0.45,topY+1,Math.sin(a)*topR*0.45);
        s.rotation.z=-Math.cos(a)*1.4;s.rotation.x=Math.sin(a)*1.4;g.add(s);}
    } else if(spec.type==='nub'){
      const nub=new THREE.Mesh(new THREE.SphereGeometry(3.2,14,10),leafMat(spec.color));
      nub.scale.set(1,0.5,1);nub.position.set(0,topY+1,0);g.add(nub);
    } else if(spec.type==='tip'){
      const tip=new THREE.Mesh(new THREE.ConeGeometry(4.2,10,12),leafMat(spec.color));
      tip.position.set(0,topY+4.5,0);tip.castShadow=true;g.add(tip);
    } else if(spec.type==='stem'){
      const st=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.9,13,8),leafMat(spec.color));
      st.position.set(0,topY+6.5,0);st.castShadow=true;g.add(st);
      const cr=new THREE.Mesh(new THREE.CylinderGeometry(0.95,0.95,10,6),leafMat(spec.color));
      cr.rotation.z=Math.PI/2;cr.position.set(0,topY+12,0);g.add(cr);
    }
    return g;
  }

  const floorGroup=new THREE.Group();scene.add(floorGroup);
  const back=new THREE.Mesh(new THREE.PlaneGeometry(1200,800),new THREE.MeshBasicMaterial({color:0xeef1f4}));
  back.position.set(0,70,-220);scene.add(back);
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(1200,1200),new THREE.ShadowMaterial({opacity:0.24}));
  floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;floorGroup.add(floor);
  const floorTint=new THREE.Mesh(new THREE.PlaneGeometry(1200,1200),new THREE.MeshBasicMaterial({color:0xe8edf1}));
  floorTint.rotation.x=-Math.PI/2;floorTint.position.y=-0.15;floorGroup.add(floorTint);

  scene.add(new THREE.AmbientLight(0xffffff,0.32));
  const klight=new THREE.DirectionalLight(0xfff3e6,2.6);klight.position.set(85,175,105);klight.castShadow=true;
  klight.shadow.mapSize.set(2048,2048);klight.shadow.camera.near=10;klight.shadow.camera.far=520;
  klight.shadow.camera.left=-120;klight.shadow.camera.right=120;klight.shadow.camera.top=130;klight.shadow.camera.bottom=-130;
  klight.shadow.bias=-0.0005;scene.add(klight);
  const rim=new THREE.DirectionalLight(0xdbecff,1.5);rim.position.set(-105,75,-85);scene.add(rim);
  const fillL=new THREE.DirectionalLight(0xffffff,0.6);fillL.position.set(25,-55,135);scene.add(fillL);

  let autoRot=true,jamOn=true,rx=0.06,ry=0.6,dist=200,drag=false,px=0,py=0,cur="pear",group=null;

  function build(key){
    if(group){scene.remove(group);group.traverse(o=>{if(o.geometry)o.geometry.dispose();});}
    group=new THREE.Group();const F=FRUITS[key];
    const outer=catmull(F.ctrl,26);const Htot=outer[outer.length-1][1];const topR=outer[outer.length-1][0];
    const cs=[];outer.forEach(p=>cs.push(new THREE.Vector2(p[0],p[1])));
    cs.push(new THREE.Vector2(Math.max(0.4,topR-WALL),Htot));
    for(let i=outer.length-1;i>=0;i--){const r=outer[i][0],z=outer[i][1];if(z<=BASE)break;cs.push(new THREE.Vector2(Math.max(0.4,r-WALL),z));}
    cs.push(new THREE.Vector2(Math.max(0.4,outer.find(p=>p[1]>=BASE)[0]-WALL),BASE));
    cs.push(new THREE.Vector2(0.001,BASE));cs.push(new THREE.Vector2(0.001,0));
    const geo=new THREE.LatheGeometry(cs,180);geo.computeVertexNormals();geo.translate(0,-Htot/2,0);
    const jar=new THREE.Mesh(geo,glassMat);jar.castShadow=true;group.add(jar);

    function interpR(z){for(let i=1;i<outer.length;i++){const a=outer[i-1],b=outer[i];if(z>=a[1]&&z<=b[1]){const t=(z-a[1])/((b[1]-a[1])||1);return a[0]+(b[0]-a[0])*t;}}return topR;}
    const rIn=z=>Math.max(0.4,interpR(z)-WALL-0.5);const fillZ=Htot-7;
    const jcs=[new THREE.Vector2(0.001,BASE),new THREE.Vector2(rIn(BASE),BASE)];
    outer.forEach(p=>{if(p[1]>BASE&&p[1]<fillZ)jcs.push(new THREE.Vector2(rIn(p[1]),p[1]));});
    jcs.push(new THREE.Vector2(rIn(fillZ),fillZ));jcs.push(new THREE.Vector2(0.001,fillZ));
    const jgeo=new THREE.LatheGeometry(jcs,180);jgeo.computeVertexNormals();jgeo.translate(0,-Htot/2,0);
    const jamMat=new THREE.MeshPhysicalMaterial({color:F.jam,roughness:0.32,metalness:0,clearcoat:0.7,clearcoatRoughness:0.2,
      transmission:0.1,thickness:60,ior:1.37,attenuationColor:new THREE.Color(F.att),attenuationDistance:22,
      emissive:new THREE.Color(F.jam),emissiveIntensity:0.06,envMapIntensity:0.6});
    const jam=new THREE.Mesh(jgeo,jamMat);jam.castShadow=true;jam.visible=jamOn;group.add(jam);

    const topper=makeTopper(F.top,Htot/2,topR);group.add(topper);

    group.userData={Htot,jam};scene.add(group);
    const maxR=Math.max.apply(null,outer.map(p=>p[0]));dist=Math.max(Htot,2*maxR)*2.55;
    floorGroup.position.y=-Htot/2-0.3;
  }

  const bar=document.getElementById('fruitBar');
  ORDER.forEach(k=>{const b=document.createElement('button');b.textContent=FRUITS[k].jp;b.dataset.k=k;
    b.onclick=()=>{cur=k;build(k);updateCards();[...bar.children].forEach(c=>c.classList.toggle('act',c.dataset.k===k));};bar.appendChild(b);});
  function updateCards(){const d=DIMS[cur];document.getElementById('cards').innerHTML=
    '<div class="card"><div class="l">内容積</div><div class="v">140 ml</div></div>'+
    '<div class="card"><div class="l">高さ</div><div class="v">'+d[0]+' mm</div></div>'+
    '<div class="card"><div class="l">最大径</div><div class="v">'+d[1]+' mm</div></div>'+
    '<div class="card"><div class="l">口内径</div><div class="v">'+d[2]+' mm</div></div>';}

  const btnR=document.getElementById('btnRot');
  btnR.onclick=()=>{autoRot=!autoRot;btnR.textContent=(autoRot?'⏸':'▶')+' 自動回転';};
  const btnJ=document.getElementById('btnJam');
  btnJ.onclick=()=>{jamOn=!jamOn;if(group)group.userData.jam.visible=jamOn;btnJ.textContent=(jamOn?'● ジャムあり':'○ ジャムなし');};

  const el=renderer.domElement;el.style.cursor='grab';
  el.addEventListener('pointerdown',e=>{drag=true;el.style.cursor='grabbing';px=e.clientX;py=e.clientY;});
  window.addEventListener('pointerup',()=>{drag=false;el.style.cursor='grab';});
  window.addEventListener('pointermove',e=>{if(!drag)return;ry+=(e.clientX-px)*0.01;rx+=(e.clientY-py)*0.01;rx=Math.max(-0.9,Math.min(1.1,rx));px=e.clientX;py=e.clientY;});
  el.addEventListener('wheel',e=>{e.preventDefault();dist=Math.max(120,Math.min(440,dist+e.deltaY*0.2));},{passive:false});

  build(cur);updateCards();[...bar.children].forEach(c=>c.classList.toggle('act',c.dataset.k===cur));
  function loop(){requestAnimationFrame(loop);
    if(autoRot&&!drag)ry+=0.006;
    cam.position.set(Math.sin(ry)*Math.cos(rx)*dist,Math.sin(rx)*dist+14,Math.cos(ry)*Math.cos(rx)*dist);
    cam.lookAt(0,2,0);renderer.render(scene,cam);}
  loop();
  window.addEventListener('resize',()=>{const w=stage.clientWidth;renderer.setSize(w,H);cam.aspect=w/H;cam.updateProjectionMatrix();});
})();
</script>
</body>
</html>
