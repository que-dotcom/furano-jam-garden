<!DOCTYPE html>
<html lang="ja">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; base-uri 'self';">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>りんご型ジャム瓶 — クリアガラス プレビュー</title>
<style>
  :root{--ink:#2b2f33;--muted:#6b7178;}
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(180deg,#fbfcfd,#eef1f4);color:var(--ink);
    font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 40px;}
  h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  p.sub{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:0 0 12px;}
  button{font:inherit;font-size:13px;padding:7px 12px;border:1px solid #cdd3da;background:#fff;border-radius:8px;cursor:pointer;}
  button:hover{background:#f3f5f7;}
  .hint{font-size:13px;color:var(--muted);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:0 0 14px;}
  .card{background:#fff;border:1px solid #e6e9ed;border-radius:10px;padding:10px 12px;}
  .card .l{font-size:12px;color:var(--muted);}
  .card .v{font-size:22px;font-weight:600;}
  #stage{width:100%;height:460px;border-radius:14px;border:1px solid #e2e6ea;
    background:radial-gradient(120% 90% at 50% 25%,#ffffff,#e7ebef);overflow:hidden;}
</style>
</head>
<body>
<div class="wrap">
  <h1>りんご型ジャム瓶 — クリアガラス</h1>
  <p class="sub">内容積 140 ml ／ ガラス肉厚 約5mm ／ 底厚 8mm ／ 単純開口</p>
  <div class="bar">
    <button id="btnRot">⏸ 自動回転</button>
    <button id="btnJam">● ジャムを入れる</button>
    <span class="hint">ドラッグで回転 ・ ホイールで拡大</span>
  </div>
  <div class="cards">
    <div class="card"><div class="l">内容積</div><div class="v">140 ml</div></div>
    <div class="card"><div class="l">高さ</div><div class="v">57.6 mm</div></div>
    <div class="card"><div class="l">最大径</div><div class="v">80.6 mm</div></div>
    <div class="card"><div class="l">口内径</div><div class="v">27 mm</div></div>
  </div>
  <div id="stage"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const stage=document.getElementById('stage');
  const H=460;
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(stage.clientWidth,H);
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.05;
  renderer.physicallyCorrectLights=true;
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  stage.appendChild(renderer.domElement);
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(34,stage.clientWidth/H,0.1,3000);

  function envTexture(){
    const c=document.createElement('canvas');c.width=1024;c.height=512;const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,0,512);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.45,'#eef1f4');g.addColorStop(1,'#c7ced6');
    x.fillStyle=g;x.fillRect(0,0,1024,512);
    let rg=x.createRadialGradient(360,150,20,360,150,260);
    rg.addColorStop(0,'rgba(255,255,255,1)');rg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=rg;x.fillRect(0,0,1024,512);
    rg=x.createRadialGradient(760,120,10,760,120,150);
    rg.addColorStop(0,'rgba(255,255,255,0.8)');rg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=rg;x.fillRect(0,0,1024,512);
    const t=new THREE.CanvasTexture(c);t.mapping=THREE.EquirectangularReflectionMapping;t.encoding=THREE.sRGBEncoding;return t;
  }
  const pmrem=new THREE.PMREMGenerator(renderer);pmrem.compileEquirectangularShader();
  scene.environment=pmrem.fromEquirectangular(envTexture()).texture;

  const ctrl=[[0,0],[14.97,1.73],[26.49,5.76],[36.28,13.82],[40.31,27.64],[36.86,41.46],[27.64,50.68],[20.73,55.29],[18.43,57.59]];
  function catmull(pts,n){const P=[pts[0],...pts,pts[pts.length-1]],out=[];
    for(let i=0;i<P.length-3;i++){const p0=P[i],p1=P[i+1],p2=P[i+2],p3=P[i+3];
      for(let j=0;j<n;j++){const t=j/n,t2=t*t,t3=t2*t;
        const r=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
        const z=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
        out.push([Math.max(0,r),z]);}}
    out.push(pts[pts.length-1]);return out;}
  const WALL=5,BASE=8;
  const outer=catmull(ctrl,26);
  const Htot=outer[outer.length-1][1];
  const cs=[];
  outer.forEach(p=>cs.push(new THREE.Vector2(p[0],p[1])));
  cs.push(new THREE.Vector2(Math.max(0.4,outer[outer.length-1][0]-WALL),Htot));
  for(let i=outer.length-1;i>=0;i--){const r=outer[i][0],z=outer[i][1];if(z<=BASE)break;cs.push(new THREE.Vector2(Math.max(0.4,r-WALL),z));}
  cs.push(new THREE.Vector2(Math.max(0.4,outer.find(p=>p[1]>=BASE)[0]-WALL),BASE));
  cs.push(new THREE.Vector2(0.001,BASE));cs.push(new THREE.Vector2(0.001,0));
  const geo=new THREE.LatheGeometry(cs,160);geo.computeVertexNormals();geo.translate(0,-Htot/2,0);

  const glass=new THREE.MeshPhysicalMaterial({color:0xffffff,metalness:0,roughness:0.05,transmission:1.0,
    thickness:14,ior:1.5,clearcoat:1.0,clearcoatRoughness:0.06,envMapIntensity:1.25,
    attenuationColor:new THREE.Color(0xeaf7ff),attenuationDistance:220,transparent:true,side:THREE.DoubleSide});
  const jar=new THREE.Mesh(geo,glass);jar.castShadow=true;scene.add(jar);

  function interpR(z){for(let i=1;i<outer.length;i++){const a=outer[i-1],b=outer[i];if(z>=a[1]&&z<=b[1]){const t=(z-a[1])/((b[1]-a[1])||1);return a[0]+(b[0]-a[0])*t;}}return outer[outer.length-1][0];}
  const rIn=z=>Math.max(0.4,interpR(z)-WALL-0.5);
  const fillZ=Htot-7;
  const jcs=[new THREE.Vector2(0.001,BASE),new THREE.Vector2(rIn(BASE),BASE)];
  outer.forEach(p=>{if(p[1]>BASE&&p[1]<fillZ)jcs.push(new THREE.Vector2(rIn(p[1]),p[1]));});
  jcs.push(new THREE.Vector2(rIn(fillZ),fillZ));jcs.push(new THREE.Vector2(0.001,fillZ));
  const jgeo=new THREE.LatheGeometry(jcs,160);jgeo.computeVertexNormals();jgeo.translate(0,-Htot/2,0);
  const jamMat=new THREE.MeshPhysicalMaterial({color:0x7c2c1d,roughness:0.4,metalness:0,clearcoat:0.55,clearcoatRoughness:0.28,
    transmission:0.16,thickness:45,ior:1.36,attenuationColor:new THREE.Color(0x471006),attenuationDistance:26,envMapIntensity:0.55});
  const jam=new THREE.Mesh(jgeo,jamMat);jam.castShadow=true;scene.add(jam);

  const back=new THREE.Mesh(new THREE.PlaneGeometry(800,500),new THREE.MeshBasicMaterial({color:0xeef1f4}));
  back.position.set(0,40,-150);scene.add(back);
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(800,800),new THREE.ShadowMaterial({opacity:0.22}));
  floor.rotation.x=-Math.PI/2;floor.position.y=-Htot/2-0.2;floor.receiveShadow=true;scene.add(floor);
  const floorTint=new THREE.Mesh(new THREE.PlaneGeometry(800,800),new THREE.MeshBasicMaterial({color:0xe9edf1}));
  floorTint.rotation.x=-Math.PI/2;floorTint.position.y=-Htot/2-0.3;scene.add(floorTint);

  scene.add(new THREE.AmbientLight(0xffffff,0.35));
  const key=new THREE.DirectionalLight(0xffffff,2.4);key.position.set(70,140,90);
  key.castShadow=true;key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.near=10;key.shadow.camera.far=400;
  key.shadow.camera.left=-90;key.shadow.camera.right=90;key.shadow.camera.top=90;key.shadow.camera.bottom=-90;
  key.shadow.bias=-0.0005;scene.add(key);
  const rim=new THREE.DirectionalLight(0xdfeeff,1.4);rim.position.set(-90,60,-70);scene.add(rim);
  const fill=new THREE.DirectionalLight(0xffffff,0.6);fill.position.set(20,-40,120);scene.add(fill);

  let autoRot=true,rx=0.05,ry=0.6,dist=190,drag=false,px=0,py=0;
  const btnR=document.getElementById('btnRot');
  btnR.onclick=()=>{autoRot=!autoRot;btnR.textContent=(autoRot?'⏸':'▶')+' 自動回転';};
  const btnJ=document.getElementById('btnJam');
  btnJ.onclick=()=>{jam.visible=!jam.visible;btnJ.textContent=(jam.visible?'● ジャムあり':'○ ジャムなし');};
  const el=renderer.domElement;el.style.cursor='grab';
  el.addEventListener('pointerdown',e=>{drag=true;el.style.cursor='grabbing';px=e.clientX;py=e.clientY;});
  window.addEventListener('pointerup',()=>{drag=false;el.style.cursor='grab';});
  window.addEventListener('pointermove',e=>{if(!drag)return;ry+=(e.clientX-px)*0.01;rx+=(e.clientY-py)*0.01;rx=Math.max(-0.9,Math.min(1.1,rx));px=e.clientX;py=e.clientY;});
  el.addEventListener('wheel',e=>{e.preventDefault();dist=Math.max(120,Math.min(320,dist+e.deltaY*0.15));},{passive:false});

  function loop(){requestAnimationFrame(loop);
    if(autoRot&&!drag)ry+=0.006;
    cam.position.set(Math.sin(ry)*Math.cos(rx)*dist,Math.sin(rx)*dist+12,Math.cos(ry)*Math.cos(rx)*dist);
    cam.lookAt(0,2,0);renderer.render(scene,cam);}
  loop();
  window.addEventListener('resize',()=>{const w=stage.clientWidth;renderer.setSize(w,H);cam.aspect=w/H;cam.updateProjectionMatrix();});
})();
</script>
</body>
</html>
